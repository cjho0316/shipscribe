name: Deploy (azd)

# Provision + deploy ShipScribe to Azure with the Azure Developer CLI.
# Auth uses GitHub OIDC federated credentials (no long-lived secrets).
# The GitHub-hosted runner has Docker, so the container image is built on the
# runner and pushed to ACR (this avoids ACR Tasks / remote build entirely).
#
# Configure once with:  azd pipeline config --provider github
# (creates the federated app registration and sets the variables below).
on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'docs/**'

permissions:
  id-token: write   # request the OIDC token for federated Azure login
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # keep full git history for the app's git tools

      - name: Install azd
        uses: Azure/setup-azd@v2

      - name: Log in to Azure (federated, no secret)
        run: |
          azd auth login \
            --client-id "$AZURE_CLIENT_ID" \
            --federated-credential-provider "github" \
            --tenant-id "$AZURE_TENANT_ID"

      - name: Provision infrastructure
        run: azd provision --no-prompt

      - name: Deploy application
        run: azd deploy --no-prompt
