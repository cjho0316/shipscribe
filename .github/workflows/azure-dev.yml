name: Deploy (azd)

# Provision + deploy ShipScribe to Azure with the Azure Developer CLI.
# Auth uses GitHub OIDC federated credentials (no long-lived secrets), configured
# by `azd pipeline config`. The GitHub-hosted runner has Docker, so the container
# image is built on the runner and pushed to ACR (avoids ACR Tasks entirely).
on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'docs/**'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      # Pin to a model with available quota in eastus2 (gpt-4.1 non-mini quota is 0).
      AZURE_OPENAI_DEPLOYMENT: ${{ vars.AZURE_OPENAI_DEPLOYMENT }}
      AZURE_OPENAI_MODEL_VERSION: ${{ vars.AZURE_OPENAI_MODEL_VERSION }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install azd
        uses: Azure/setup-azd@v2

      - name: Sign in to Azure with azd (OIDC federated)
        run: |
          azd auth login \
            --client-id "${{ vars.AZURE_CLIENT_ID }}" \
            --federated-credential-provider github \
            --tenant-id "${{ vars.AZURE_TENANT_ID }}"

      - name: Provision and deploy (azd up)
        run: azd up --no-prompt
