# Azure Developer CLI (azd) configuration — one command: `azd up`.
# Provisions Foundry + Container Apps (infra/main.bicep) and deploys the
# ShipScribe web server as a container (Dockerfile) with keyless managed identity.
# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
name: shipscribe
metadata:
  template: shipscribe@0.1.0
infra:
  provider: bicep
  path: infra
  module: main
services:
  web:
    project: .
    language: js
    host: containerapp
    docker:
      path: ./Dockerfile
      # Build the image remotely in ACR so no local Docker Desktop is needed.
      remoteBuild: true
